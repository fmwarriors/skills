<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="200"
     height="200"
     viewBox="0 0 200 200">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A90E2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#357ABD" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="radialGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4A90E2" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <g>
    <!-- Circle with linear gradient -->
    <circle cx="100" cy="100" r="80" fill="url(#blueGradient)"/>
    <!-- Inner glow effect -->
    <circle cx="100" cy="100" r="60" fill="url(#radialGlow)" style="opacity:0.6"/>
  </g>
</svg>
