<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="400"
     height="300"
     viewBox="0 0 400 300">
  <!-- Examples - theme-compatible shapes (no fill, inherits from fm_fill) -->

  <!-- Rectangle - inherits theme color -->
  <rect x="20" y="20" width="80" height="60" stroke="#000000" stroke-width="2"/>

  <!-- Circle - inherits theme color -->
  <circle cx="170" cy="50" r="30" stroke="#000000" stroke-width="2"/>

  <!-- Ellipse - inherits theme color -->
  <ellipse cx="280" cy="50" rx="50" ry="30" stroke="#000000" stroke-width="2"/>

  <!-- Line - stroke only, no fill -->
  <line x1="20" y1="120" x2="100" y2="180" stroke="#000000" stroke-width="3"/>

  <!-- Polyline (open) - transparent, stroke only -->
  <polyline points="140,120 170,160 200,130 230,180"
            fill="none" stroke="#000000" stroke-width="3"/>

  <!-- Polygon (closed) - inherits theme color -->
  <polygon points="270,120 320,120 345,160 320,200 270,200 245,160"
           stroke="#000000" stroke-width="2"/>

  <!-- Path with curves - transparent, stroke only -->
  <path d="M 20 220 Q 60 180 100 220 T 180 220"
        fill="none" stroke="#000000" stroke-width="3"/>

  <!-- Complex path - inherits theme color -->
  <path d="M 220 220 L 260 220 L 280 250 L 260 280 L 220 280 Z"
        stroke="#000000" stroke-width="2"/>
</svg>
